name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun run test:coverage # tests (workerd) + istanbul coverage -> coverage/lcov.info
        env:
          DEVANT_CLOUD_TOKEN: ${{ secrets.DEVANT_CLOUD_TOKEN }}
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false # a Codecov hiccup should not fail the build
